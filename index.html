
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fit Architect - Pain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
         * OBSIDIAN PROTOCOL — Design Token System v2.0
         * Fit Architect / Codename: OBSIDIAN
         * ============================================================ */

        :root {
            /* --- LIGHT MODE --- */
            /* Bases */
            --color-bg-base: #FAFAFA;
            --color-surface-bg-rgb: 255, 255, 255;
            --color-surface-hover-rgb: 244, 244, 245;
            --color-surface-border-rgb: 228, 228, 231;
            --color-surface-border-opacity: 1;

            /* Text */
            --color-text-primary-rgb: 9, 9, 11;
            --color-text-secondary-rgb: 113, 113, 122;
            --color-text-muted-rgb: 161, 161, 170;

            /* Brand Accent — Violet */
            --color-brand-accent-rgb: 109, 40, 217;
            --color-brand-accent-glow: rgba(109, 40, 217, 0.12);
            --color-brand-accent-subtle: rgba(109, 40, 217, 0.08);

            /* Macros — Semantically distinguishable */
            --color-brand-protein-rgb: 14, 165, 233;  /* Sky-500  — Protein  */
            --color-brand-carbs-rgb:   245, 158, 11;  /* Amber-500 — Carbs   */
            --color-brand-fat-rgb:     225, 29, 72;   /* Rose-600  — Fat     */

            /* Semantic States */
            --color-success-rgb: 16, 185, 129;
            --color-warning-rgb: 245, 158, 11;
            --color-danger-rgb:  220, 38, 38;

            /* Inputs */
            --color-input-bg: #FFFFFF;
            --color-input-border: rgba(228, 228, 231, 1);

            /* Shadows */
            --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.07), 0 1px 2px -1px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px -4px rgba(0,0,0,0.12), 0 4px 8px -4px rgba(0,0,0,0.06);
            --shadow-glow: 0 0 20px var(--color-brand-accent-glow);

            /* Background */
            --bg-gradient: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(109,40,217,0.04) 0%, transparent 70%);
        }

        .dark {
            /* --- DARK MODE (OBSIDIAN) — PRIMARY --- */
            /* Bases */
            --color-bg-base: #09090B;
            --color-surface-bg-rgb: 24, 24, 27;
            --color-surface-hover-rgb: 39, 39, 42;
            --color-surface-border-rgb: 63, 63, 70;
            --color-surface-border-opacity: 0.6;

            /* Text */
            --color-text-primary-rgb: 250, 250, 250;
            --color-text-secondary-rgb: 161, 161, 170;
            --color-text-muted-rgb: 113, 113, 122;

            /* Brand Accent — Violet (same hue, brighter in dark) */
            --color-brand-accent-rgb: 167, 139, 250;
            --color-brand-accent-glow: rgba(167, 139, 250, 0.2);
            --color-brand-accent-subtle: rgba(167, 139, 250, 0.08);

            /* Macros — Vivid in dark context */
            --color-brand-protein-rgb: 34, 211, 238;   /* Cyan-400  — Protein */
            --color-brand-carbs-rgb:   251, 191, 36;   /* Amber-400 — Carbs  */
            --color-brand-fat-rgb:     251, 113, 133;  /* Rose-400  — Fat    */

            /* Semantic States */
            --color-success-rgb: 52, 211, 153;
            --color-warning-rgb: 251, 191, 36;
            --color-danger-rgb:  248, 113, 113;

            /* Inputs */
            --color-input-bg: rgba(24, 24, 27, 0.9);
            --color-input-border: rgba(63, 63, 70, 0.8);

            /* Shadows */
            --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.4);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.5), 0 2px 4px -2px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 28px -4px rgba(0,0,0,0.6), 0 4px 10px -4px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 24px var(--color-brand-accent-glow);

            /* Background */
            --bg-gradient: radial-gradient(ellipse 70% 45% at 50% -5%, rgba(167,139,250,0.06) 0%, transparent 65%);
        }

        /* === PHYSICS / EASE SYSTEM === */
        :root {
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.32, 0.72, 0, 1);
            --ease-snap:   cubic-bezier(0.15, 0, 0.2, 1);

            --duration-instant: 100ms;
            --duration-fast:    200ms;
            --duration-normal:  350ms;
            --duration-slow:    500ms;
        }

        /* === ATMOSPHERE === */
        body {
            background-color: var(--color-bg-base);
            background-image: var(--bg-gradient);
            color: rgb(var(--color-text-primary-rgb));
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.4s var(--ease-smooth), color 0.4s var(--ease-smooth);
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(var(--color-surface-border-rgb)); border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* === SELECT ARROW === */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23737373' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        /* === SQUISHY UI: Global active state === */
        button:not([disabled]):active,
        [role="button"]:not([disabled]):active {
            transition: transform var(--duration-instant) var(--ease-spring);
        }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans:    ['Inter', 'system-ui', 'sans-serif'],
              heading: ['"Space Grotesk"', 'Inter', 'sans-serif'],
              mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
                /* Brand */
                'brand-accent':   'rgb(var(--color-brand-accent-rgb) / <alpha-value>)',
                'brand-protein':  'rgb(var(--color-brand-protein-rgb) / <alpha-value>)',
                'brand-carbs':    'rgb(var(--color-brand-carbs-rgb) / <alpha-value>)',
                'brand-fat':      'rgb(var(--color-brand-fat-rgb) / <alpha-value>)',

                /* Text */
                'text-primary':   'rgb(var(--color-text-primary-rgb) / <alpha-value>)',
                'text-secondary': 'rgb(var(--color-text-secondary-rgb) / <alpha-value>)',
                'text-muted':     'rgb(var(--color-text-muted-rgb) / <alpha-value>)',

                /* Surfaces */
                'surface-bg':     'rgb(var(--color-surface-bg-rgb) / <alpha-value>)',
                'surface-border': 'rgba(var(--color-surface-border-rgb), var(--color-surface-border-opacity))',
                'surface-hover':  'rgb(var(--color-surface-hover-rgb) / <alpha-value>)',
                'bg-base':        'var(--color-bg-base)',

                /* Inputs */
                'input-bg':     'var(--color-input-bg)',
                'input-border': 'var(--color-input-border)',

                /* Semantic states */
                'success': 'rgb(var(--color-success-rgb) / <alpha-value>)',
                'warning': 'rgb(var(--color-warning-rgb) / <alpha-value>)',
                'danger':  'rgb(var(--color-danger-rgb) / <alpha-value>)',
            },
            boxShadow: {
                'sm':   'var(--shadow-sm)',
                'md':   'var(--shadow-md)',
                'lg':   'var(--shadow-lg)',
                'glow': 'var(--shadow-glow)',
            },
            transitionTimingFunction: {
                'spring': 'var(--ease-spring)',
                'smooth': 'var(--ease-smooth)',
                'snap':   'var(--ease-snap)',
            },
            animation: {
                'fade-in-up':   'fadeInUp 0.35s var(--ease-smooth) forwards',
                'pop-in':       'popIn 0.3s var(--ease-spring) forwards',
                'scale-in':     'scaleIn 0.35s var(--ease-smooth) forwards',
                'slide-in-up':  'slideInUp 0.4s var(--ease-smooth) forwards',
                'glow-pulse':   'glowPulse 2.5s ease-in-out infinite',
                'scan':         'scan 2s linear infinite',
                'scan-vertical':'scanVertical 2s linear infinite',
            },
            keyframes: {
                fadeInUp: {
                    '0%':   { opacity: '0', transform: 'translateY(12px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                popIn: {
                    '0%':   { opacity: '0', transform: 'scale(0.92)' },
                    '100%': { opacity: '1', transform: 'scale(1)' },
                },
                scaleIn: {
                    '0%':   { opacity: '0', transform: 'scale(0.95) translateY(8px)' },
                    '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                },
                slideInUp: {
                    '0%':   { opacity: '0', transform: 'translateY(24px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                glowPulse: {
                    '0%, 100%': { boxShadow: '0 0 0px transparent' },
                    '50%':      { boxShadow: 'var(--shadow-glow)' },
                },
                scan: {
                    '0%':   { transform: 'translateY(-100px)' },
                    '50%':  { transform: 'translateY(100px)' },
                    '100%': { transform: 'translateY(-100px)' },
                },
                scanVertical: {
                    '0%':   { top: '0%' },
                    '50%':  { top: '100%' },
                    '100%': { top: '0%' },
                },
            }
          }
        }
      }
    </script>

{
  "imports": {
    "react-dom": "https://esm.sh/react-dom@^18.2.0",

  }
}
</script>
