<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0" />
      <stop offset="20%" stop-color="#34d399" stop-opacity="1" />
      <stop offset="80%" stop-color="#34d399" stop-opacity="1" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="#18181b" />
  
  <g filter="url(#glow)">
    <path class="wave fade-in-out" d="M -200 225 L 150 225 L 200 225 L 240 100 L 280 350 L 320 225 L 360 150 L 400 300 L 440 225 L 500 225 L 1000 225" 
          fill="transparent" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <style>
    .wave {
      animation: panRight 3s linear infinite;
    }
    
    @keyframes panRight {
      0% {
        transform: translateX(-400px);
      }
      100% {
        transform: translateX(400px);
      }
    }
  </style>
</svg>
